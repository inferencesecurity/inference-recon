services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-inference_recon}
      POSTGRES_USER:     ${POSTGRES_USER:-eval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eval}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./eval/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./eval/db/init-metabase-db.sh:/docker-entrypoint-initdb.d/02-init-metabase-db.sh:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eval} -d ${POSTGRES_DB:-inference_recon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${POSTGRES_USER:-eval}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-eval}
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: eval/Dockerfile
    command: uvicorn eval.ui.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "${UI_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-eval}@db:5432/${POSTGRES_DB:-inference_recon}
    depends_on:
      db:
        condition: service_healthy

  scanner:
    build:
      context: .
      dockerfile: eval/Dockerfile
    volumes:
      - .:/app                              # full repo mounted read-write
    working_dir: /app
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - GOOGLE_API_KEY
      - DATABASE_URL=postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-eval}@db:5432/${POSTGRES_DB:-inference_recon}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scanner                             # not started by default; use:
                                            # docker compose run --rm scanner \
                                            #   python eval/batch_scan.py eval/corpus/repos.txt

  pricing-sync:
    build:
      context: .
      dockerfile: eval/Dockerfile
    command: python eval/sync_pricing.py --loop
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-eval}@db:5432/${POSTGRES_DB:-inference_recon}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
