{% extends "base.html" %}
{% block title %}Scan Running — AI Sec Review{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Scan Output</h1>
  <span id="status-badge" class="badge sev-info">connecting…</span>
</div>

<div class="card" style="padding:0">
  <pre id="log" class="scan-log">Connecting to scan stream…</pre>
</div>

<div id="done-bar" style="display:none; margin-top:12px" class="flex">
  <span id="done-msg" class="text-muted"></span>
  <a href="/" class="btn btn-ghost">← Dashboard</a>
  <a href="/scan" class="btn btn-primary">Run Another</a>
</div>

<script>
const log    = document.getElementById('log');
const badge  = document.getElementById('status-badge');
const done   = document.getElementById('done-bar');
const doneMsg = document.getElementById('done-msg');

const es = new EventSource('/scan/stream');

es.onopen = () => {
  log.textContent = '';
  badge.textContent = 'running';
  badge.className = 'badge sev-high';
};

es.onmessage = e => {
  if (e.data) {
    log.textContent += e.data + '\n';
    log.scrollTop = log.scrollHeight;
  }
};

es.addEventListener('done', e => {
  es.close();
  const code = e.data || '';
  const ok   = code.includes('exit_code=0') || code === '';
  badge.textContent = ok ? 'complete' : 'finished with errors';
  badge.className   = ok ? 'badge grade-a' : 'badge sev-high';
  doneMsg.textContent = ok ? 'Scan complete. Results ingested.' : 'Scan finished — check log for errors.';
  done.style.display = 'flex';
});

es.onerror = () => {
  if (es.readyState === EventSource.CLOSED) return;
  badge.textContent = 'disconnected';
  badge.className   = 'badge sev-info';
};
</script>
{% endblock %}
