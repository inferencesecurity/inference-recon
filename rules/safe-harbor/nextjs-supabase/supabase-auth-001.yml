id: supabase-auth-001
schema_version: "1.0"
title: Middleware session validation with hard failure on auth error
stacks: [nextjs, supabase]
category: architecture

owasp_refs:
  - title: "Authentication Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"
    section: "Implement Proper Error Handling"
  - title: "Session Management Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html"
    section: "Session Expiration"

source_version: "OWASP CS 2024-01 / Supabase Auth Helpers Docs 2026-05-28"
last_reviewed_at: "2026-05-28"
review_cadence: quarterly

description: >
  Next.js middleware is the standard place to enforce authentication on
  protected routes. The correct pattern: validate the session, and on any
  failure (invalid token, expired session, missing cookie) redirect to the
  login page or return a 401 — never continue execution. A fail-open
  pattern (swallowing auth errors with an empty catch) means authentication
  failures are invisible to the application and every protected route becomes
  effectively public.

correct_pattern: >
  Middleware calls a session validation function. On success, execution
  continues to the route. On any failure — whether thrown exception or
  null/undefined session return — the middleware redirects to a login
  route or returns a NextResponse with a 401/403 status. The failure
  path is explicit and unconditional. No catch block exists that allows
  execution to continue past a failed auth check.

correct_examples:
  - label: "Middleware with hard redirect on auth failure — correct"
    code: |
      // middleware.ts
      import { createServerClient } from '@supabase/ssr'
      import { NextResponse } from 'next/server'

      export async function middleware(req: NextRequest) {
        const res = NextResponse.next()
        const supabase = createServerClient(
          process.env.NEXT_PUBLIC_SUPABASE_URL!,
          process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,  // anon key — correct for middleware
          { cookies: { /* ... */ } }
        )

        const { data: { session }, error } = await supabase.auth.getSession()

        if (error || !session) {
          // Hard failure — redirect, do not continue
          return NextResponse.redirect(new URL('/login', req.url))
        }

        return res
      }
    notes: >
      Key signals: anon key used (not service-role), explicit check for
      both error and null session, redirect on failure, no catch that
      swallows errors.

  - label: "Middleware with 401 return on failure — correct"
    code: |
      export async function middleware(req: NextRequest) {
        const token = req.cookies.get('auth-token')?.value

        if (!token) {
          return new NextResponse('Unauthorized', { status: 401 })
        }

        try {
          await verifyToken(token)
        } catch (e) {
          // Re-throw or return — never swallow
          return new NextResponse('Unauthorized', { status: 401 })
        }

        return NextResponse.next()
      }
    notes: >
      Catch block is acceptable here because it RETURNS a 401 — it does
      not allow execution to continue. The key distinction from a fail-open
      pattern is that every failure path terminates the request.

incorrect_variants:
  - label: "Empty catch — fail-open — critical"
    severity: critical
    description: >
      The catch block is empty or only logs. Execution continues to the
      route handler regardless of whether auth succeeded. Every protected
      route is now effectively unauthenticated on any auth error.
    code: |
      export async function middleware(req: NextRequest) {
        try {
          await verifySession(req)
        } catch (e) {
          // empty — execution falls through to NextResponse.next()
        }
        return NextResponse.next()
      }

  - label: "Catch with console.log only — fail-open — critical"
    severity: critical
    description: >
      Logging the error without terminating the request is still fail-open.
      The route handler executes as if authentication succeeded.
    code: |
      try {
        await verifySession(req)
      } catch (e) {
        console.error('Auth error:', e)  // logs but continues
      }
      return NextResponse.next()

  - label: "Missing null check on session — high"
    severity: high
    description: >
      Checks for error but not for a null session. Supabase auth.getSession()
      can return { data: { session: null }, error: null } for unauthenticated
      requests — no error is thrown, but the session is null.
    code: |
      const { data: { session }, error } = await supabase.auth.getSession()
      if (error) {
        return NextResponse.redirect(new URL('/login', req.url))
      }
      // Missing: if (!session) — null session passes through

context_requirements:
  - "Full middleware function body visible"
  - "All catch blocks in the auth path visible — not truncated"
  - "The failure path (redirect or return) is visible and unconditional"
  - "Session/token variable is checked for null/undefined after the auth call"

disqualifiers:
  - "Any catch block that does not return or throw — even if it logs"
  - "No explicit null check on the session/token after a successful auth call"
  - "NextResponse.next() reachable without passing through an explicit success check"
  - "Auth check is conditional (e.g. only runs on certain paths) without a clear allowlist"

confidence_weight: 0.88
suppression_threshold: 0.80
context_sensitivity: HIGH

notes: >
  A catch block that returns a 401 or redirects is NOT a disqualifier —
  it is the correct pattern. The disqualifier is a catch block that
  allows execution to continue. Distinguish carefully: catch + return ≠
  catch + continue. When the middleware function is long and the catch
  block is far from the auth check, reduce confidence and surface as
  medium rather than suppressing.
