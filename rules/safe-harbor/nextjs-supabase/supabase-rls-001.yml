id: supabase-rls-001
schema_version: "1.0"
title: Row Level Security enabled with at least one policy on user-data tables
stacks: [nextjs, supabase]
category: architecture

owasp_refs:
  - title: "Authorization Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html"
    section: "Enforce Authorization Checks at the Data Layer"
  - title: "Database Security Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Database_Security_Cheat_Sheet.html"
    section: "Access Control"

source_version: "OWASP CS 2024-01 / Supabase RLS Docs 2026-05-28"
last_reviewed_at: "2026-05-28"
review_cadence: quarterly

description: >
  Supabase uses PostgreSQL Row Level Security (RLS) to enforce access
  control at the database layer. When a client uses the anon or authenticated
  key (not service-role), RLS policies determine which rows they can read
  or write. A table without RLS enabled is publicly accessible to any
  authenticated user via the Supabase API — there is no application-layer
  check that can fully substitute for this. Correct implementation requires
  RLS to be enabled AND at least one policy to exist for each user-data table.

correct_pattern: >
  In migration files or schema definitions, every table that stores
  user or business data has both ALTER TABLE ... ENABLE ROW LEVEL SECURITY
  and at least one CREATE POLICY statement. Policies are specific about
  the operation (SELECT, INSERT, UPDATE, DELETE) and bind to auth.uid()
  or a role check. The pattern is present in the migration that creates
  the table, not added as an afterthought in a later migration.

correct_examples:
  - label: "Table with RLS enabled and user-scoped policy — correct"
    code: |
      -- supabase/migrations/20240101_create_profiles.sql
      CREATE TABLE profiles (
        id    UUID PRIMARY KEY REFERENCES auth.users(id),
        name  TEXT,
        email TEXT
      );

      -- Enable RLS — required
      ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;

      -- Policy: users can only read/write their own row
      CREATE POLICY "users can manage own profile"
        ON profiles
        FOR ALL
        USING (auth.uid() = id)
        WITH CHECK (auth.uid() = id);
    notes: >
      Key signals: ENABLE ROW LEVEL SECURITY present, at least one policy
      that references auth.uid() or a role, policy is on the same table.

  - label: "Multiple operation-specific policies — correct"
    code: |
      ALTER TABLE documents ENABLE ROW LEVEL SECURITY;

      CREATE POLICY "users can read own documents"
        ON documents FOR SELECT
        USING (auth.uid() = owner_id);

      CREATE POLICY "users can insert own documents"
        ON documents FOR INSERT
        WITH CHECK (auth.uid() = owner_id);

      CREATE POLICY "admins can read all documents"
        ON documents FOR SELECT
        USING (auth.jwt() ->> 'role' = 'admin');
    notes: >
      Multiple policies on the same table are fine — Postgres evaluates
      them permissively (OR logic for same operation). What matters is
      that at least one policy exists and RLS is enabled.

incorrect_variants:
  - label: "Table created without RLS — high"
    severity: high
    description: >
      The table is created but ENABLE ROW LEVEL SECURITY is absent.
      Any authenticated user can read all rows via the Supabase REST API
      with their session token.
    code: |
      CREATE TABLE orders (
        id      UUID PRIMARY KEY,
        user_id UUID REFERENCES auth.users(id),
        total   DECIMAL
      );
      -- Missing: ALTER TABLE orders ENABLE ROW LEVEL SECURITY;
      -- Missing: CREATE POLICY ...

  - label: "RLS enabled but no policies — high"
    severity: high
    description: >
      When RLS is enabled with no policies, Postgres defaults to DENY ALL.
      This is secure but likely unintentional — the table becomes inaccessible
      to authenticated users, which will cause application errors and may
      lead a developer to disable RLS as a 'fix'.
    code: |
      ALTER TABLE orders ENABLE ROW LEVEL SECURITY;
      -- No CREATE POLICY statements — deny-all by default
      -- Likely a mistake that will be 'fixed' by disabling RLS

  - label: "Permissive policy with no user binding — critical"
    severity: critical
    description: >
      Policy exists but allows all authenticated users to access all rows.
      Functionally equivalent to no RLS for any authenticated user.
    code: |
      CREATE POLICY "allow all authenticated"
        ON orders FOR ALL
        USING (auth.role() = 'authenticated');
      -- No user-scoping — every authenticated user can read every order

context_requirements:
  - "Migration file or schema definition fully visible"
  - "Both ENABLE ROW LEVEL SECURITY and CREATE POLICY present in same or related migration"
  - "Policy USING clause references auth.uid() or a meaningful role check (not just 'authenticated')"
  - "Table stores user or business data (not a lookup/config table)"

disqualifiers:
  - "ENABLE ROW LEVEL SECURITY absent"
  - "No CREATE POLICY statements for the table"
  - "Policy USING clause is 'true' or only checks auth.role() = 'authenticated' without user-scoping"
  - "A later migration drops RLS or policies without a clear replacement"
  - "supabase/config.toml has rls.enabled = false"

confidence_weight: 0.85
suppression_threshold: 0.78
context_sensitivity: MEDIUM

notes: >
  Lookup tables and configuration tables (e.g. feature_flags, pricing_tiers,
  country_codes) that contain no user-identifiable data and are intentionally
  read-only for all users are lower risk without RLS. Use judgment — if the
  table name suggests business or user data, require RLS. If the anon key
  is used from client-side code (createBrowserClient), the risk of missing
  RLS is higher and confidence threshold for suppression should be raised.
  When service-role key is used exclusively (server-side admin routes only),
  missing RLS is still a finding but at lower severity since RLS is bypassed
  anyway at that access level.
