id: supabase-secrets-001
schema_version: "1.0"
title: Service-role key scoped to protected server-side routes only
stacks: [nextjs, supabase]
category: secrets_and_config

owasp_refs:
  - title: "Secrets Management Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
    section: "Access Control"
  - title: "Authorization Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html"
    section: "Enforce Authorization Checks on All Requests"

source_version: "OWASP CS 2024-01 / Supabase Docs 2026-05-28"
last_reviewed_at: "2026-05-28"
review_cadence: quarterly

description: >
  Supabase exposes two API keys: the anon/public key and the service-role key.
  The service-role key bypasses ALL Row Level Security policies and grants
  unrestricted read/write access to every table. It must only ever be used
  in server-side code that runs after a verified admin check — never in
  middleware, never in client components, never in any path reachable before
  authentication is confirmed. Using it correctly is a valid pattern; using
  it in the wrong scope is a critical vulnerability.

correct_pattern: >
  A service-role Supabase client is created inside a protected server-side
  route handler (e.g. app/api/admin/*, or a Server Action with an admin gate).
  An explicit admin verification function runs BEFORE the client is instantiated
  and throws/redirects on failure. The key is sourced from a server-only
  environment variable (no NEXT_PUBLIC_ prefix). There are no catch blocks
  in the same execution path that swallow errors silently.

correct_examples:
  - label: "Admin API route — correct scope and guard"
    code: |
      // app/api/admin/users/route.ts
      import { createClient } from '@supabase/supabase-js'
      import { requireAdmin } from '@/lib/auth'

      export async function GET(req: Request) {
        // Guard runs BEFORE client creation and throws if not admin
        await requireAdmin(req)

        const supabase = createClient(
          process.env.SUPABASE_URL!,
          process.env.SUPABASE_SERVICE_ROLE_KEY!   // server-only, no NEXT_PUBLIC_ prefix
        )
        const { data } = await supabase.from('users').select('*')
        return Response.json(data)
      }
    notes: >
      Key signals: guard executes before createClient, no silent catch,
      env var is server-only, file path is under /api/admin/.

  - label: "Server Action with admin gate — correct"
    code: |
      // app/admin/actions.ts
      'use server'
      import { createClient } from '@supabase/supabase-js'
      import { verifyAdminSession } from '@/lib/auth'

      export async function deleteUser(userId: string) {
        const session = await verifyAdminSession()  // throws if not admin
        if (!session) throw new Error('Unauthorized')

        const supabase = createClient(
          process.env.SUPABASE_URL!,
          process.env.SUPABASE_SERVICE_ROLE_KEY!
        )
        await supabase.from('users').delete().eq('id', userId)
      }

incorrect_variants:
  - label: "Service-role key in middleware — critical"
    severity: critical
    description: >
      Middleware runs on EVERY request before any authentication check.
      A service-role client here means any unauthenticated caller inherits
      admin database access. This is the most common and most dangerous misuse.
    code: |
      // middleware.ts
      import { createClient } from '@supabase/supabase-js'

      export async function middleware(req: NextRequest) {
        const supabase = createClient(
          process.env.SUPABASE_URL!,
          process.env.SERVICE_ROLE_KEY!   // runs before auth — always wrong here
        )
        // ...
      }

  - label: "Service-role key with fail-open catch — critical"
    severity: critical
    description: >
      An empty or passthrough catch block after an auth check means errors
      are swallowed silently. If the auth check throws, execution continues
      as if the user were authenticated. Combined with service-role key,
      this grants full DB access on any auth failure.
    code: |
      export async function middleware(req: NextRequest) {
        try {
          await verifySession(req)
        } catch (e) {}  // fail-open: execution continues regardless

        const supabase = createClient(url, process.env.SERVICE_ROLE_KEY!)
        // ...
      }

  - label: "Service-role key in a client component — critical"
    severity: critical
    description: >
      Any file with 'use client' or that imports from React runs in the browser.
      Environment variables accessed here are bundled into client-side JS.
      Even if the variable is not NEXT_PUBLIC_ prefixed, Next.js may still
      expose it depending on build configuration.
    code: |
      'use client'
      // This key will likely end up in the browser bundle
      const supabase = createClient(url, process.env.SERVICE_ROLE_KEY!)

context_requirements:
  - "Full file content visible — not a snippet"
  - "Admin guard function visible in the same file or importable and verifiable as non-trivial"
  - "Guard executes unconditionally before createClient call"
  - "No try/catch blocks between the guard and the createClient that could swallow errors"
  - "File path confirms server-side context (app/api/, actions.ts with 'use server', etc.)"
  - "Environment variable name has no NEXT_PUBLIC_ prefix"

disqualifiers:
  - "File is middleware.ts or middleware.js at any path"
  - "File contains 'use client' directive"
  - "Any catch block between the auth guard and createClient that does not re-throw"
  - "createClient called at module scope (outside any function)"
  - "Guard is commented out or behind a debug/dev environment check"
  - "Environment variable has NEXT_PUBLIC_ prefix"
  - "Route path does not suggest admin scope (e.g. app/api/user/ vs app/api/admin/)"

confidence_weight: 0.90
suppression_threshold: 0.82
context_sensitivity: HIGH

notes: >
  The compound risk case — service-role key + fail-open catch in the same
  execution path — should always surface as Critical regardless of safe harbor
  match. A disqualifier check for silent catch blocks must run before any
  suppression decision. When context_requirements cannot all be verified
  (e.g. the guard function is imported and its implementation is not visible),
  cap confidence at 0.60 and surface as a medium-confidence finding rather
  than suppressing.
